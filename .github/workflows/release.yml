name: Generate VSIX
on:
  push:
    branches:
      - main  # Runs every time you push to the main branch
    tags:
          - 'v*'  #Triggers the workflow when you push a version tag (e.g., v1.0.0)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Grants permission to the softprops action to create a GitHub Release
          contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./extension
        run: npm install

      - name: Package Extension
        working-directory: ./extension
        run: npx @vscode/vsce package -o assertl-extension.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-package
          path: extension/assertl-extension.vsix
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: extension/assertl-extension.vsix          
