name: Generate VSIX
on:
  push:
    branches:
      - main  # Runs every time you push to the main branch
    tags:
          - 'v*'  #Triggers the workflow when you push a version tag (e.g., v1.0.0)

# Required to allow GitHub to deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  
jobs:
  # ---------------------------------------------------------
  # JOB 1: Build and Release the VS Code Extension
  # ---------------------------------------------------------
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./extension
        run: npm install

      - name: Package Extension
        working-directory: ./extension
        run: npx @vscode/vsce package -o assertl-extension.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-package
          path: extension/assertl-extension.vsix
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: extension/assertl-extension.vsix       

  # ---------------------------------------------------------
  # JOB 2: Build and Deploy Sphinx Documentation
  # ---------------------------------------------------------
  deploy-docs:
    runs-on: ubuntu-latest
    # Only deploy docs when pushing to main (skip deploying docs on tag creation to avoid double-deploying)
    if: github.ref == 'refs/heads/main' 
    
    # Specify the environment for GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Use your preferred Python version

      - name: Install Sphinx and Dependencies
        working-directory: ./docs
        run: |
          python -m pip install --upgrade pip
          # If you have a requirements.txt in your docs folder, uncomment the next line:
          # pip install -r requirements.txt
          # Otherwise, install sphinx directly:
          pip install sphinx

      - name: Build Sphinx HTML
        working-directory: ./docs
        # Assumes you have a standard Makefile generated by sphinx-quickstart
        run: make html 

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point this to the folder where Sphinx outputs the HTML files
          path: 'docs/_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
          
